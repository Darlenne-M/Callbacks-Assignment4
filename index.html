<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>

</head>

<body>
    <div id="title">
        <h1>ROCK PAPER SCISSORS GAME. GO!</h1>
    </div>

    <div id="player-section">
        <img src="images/rock.PNG" class="user-imgs">
        <img src="images/paper.PNG" class="user-imgs">
        <img src="images/scissors.PNG" class="user-imgs">
        <div class="whos-throw">YOUR THROW</div>
    </div>

    <div id="computer-section">
        <img src="images/question-mark.PNG" id="compt-img">
        <div class="whos-throw">COMPUTERS THROW</div>
    </div>

    <div id="result-section">
        <div id="result">RESULTS: </div>

        <div><h3>SCORES:</h3></div>
        <div id="player-score">Player:  </div>
        <div id="computer-score">Computer: </div>
        <button> Play Again</button>

    </div>
</body>

</html>
